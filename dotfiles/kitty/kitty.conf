## shell
shell /opt/homebrew/bin/fish

## Send Option as Alt/Meta (enables Alt+hjkl tmux nav, readline Alt+b/f/d, etc.)
macos_option_as_alt yes

## fonts
font_size        12.0
# BEGIN_KITTY_FONTS
font_family      family="DaddyTimeMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# Neon Orchid Theme for Kitty
# generated by claude sonnet 4.5
# Add this to ~/.config/kitty/kitty.conf

# Background and foreground
background #1a0a1f
foreground #ffd4f4

# Fish autosuggestion color (make it brighter/more visible)
# Add this to your ~/.config/fish/config.fish:
# set -g fish_color_autosuggestion 8855cc

# Cursor
cursor #ff69eb
cursor_text_color #1a0a1f

# Selection
selection_foreground #1a0a1f
selection_background #ff69eb

# URL underline color when hovering
url_color #91d7ff

# Tab bar colors
active_tab_foreground #1a0a1f
active_tab_background #ff69eb
inactive_tab_foreground #ffd4f4
inactive_tab_background #2d1b3d

# Window border colors
active_border_color #ff69eb
inactive_border_color #5599ff

# Black (terminal colors) - make them visible on dark background
color0 #3a2a4f
color8 #7a5a8f

# Red
color1 #ff5599
color9 #ff7ab8

# Green
color2 #55ffaa
color10 #7affcc

# Yellow
color3 #ffcc99
color11 #ffe6bb

# Blue
color4 #5599ff
color12 #7ab8ff

# Magenta/Pink (accent)
color5 #ff69eb
color13 #ff99f5

# Cyan
color6 #55ddff
color14 #7ae6ff

# White
color7 #ffd4f4
color15 #ffffff

# Optional: Transparency for atmospheric effect
background_opacity 0.90
background_blur 1

# Optional: Pink window padding
window_padding_width 4
