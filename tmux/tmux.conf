# set default shell to fish
set-option -g default-shell /opt/homebrew/bin/fish

# change tmux button to Ctrl-Space to avoid conflicts (e.g. w/ claude code, vim)

unbind C-b
set-option -g prefix C-Space
bind-key C-space send-prefix

# use vim instead of emacs keybindings in copy mode
set-window-option -g mode-keys vi

# vim-style copy/paste
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# copy to system clipboard
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'pbcopy'

# mouse support (resize panes by dragging borders, click to select panes/windows)
set-option -g mouse on

# Pane navigation — root-level Alt+hjkl (no prefix, bypasses terminal mode issues)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Longer repeat window for repeatable bindings (default 500ms)
set-option -g repeat-time 1000

# Pane resizing — prefix + H/J/K/L (repeatable, 5-cell increments)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Popup cheatsheet with Ctrl+Space then h
bind-key h display-popup -E -w 80% -h 80% "bash -c 'glow --pager ~/.config/tmux/cheat.md'"

# Claude usage tracker in status bar (updates every 60s)
set -g status-right '#(python3 ~/claude-projects/claude-usage/claude_usage.py tmux) '
set -g status-interval 60
